<!DOCTYPE html>
<html style="overscroll-behavior: none;">
  <head>
    <title>Lingo Bingo</title>
    <!-- Prevent mobile auto-scaling -->
    <meta name="viewport" content="width=device-width, height=device-height,
          initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script type="module">

      const resultEl = document.getElementById('result');
      const officeWords = [
        "Alignment", 
        "Synergy", 
        "Leverage", 
        "Optimize", 
        "Transform",
        "Enabling", 
        "Scale", 
        "Agility", 
        "Innovation", 
        "Momentum", 
        "Engagement", 
        "Execution", 
        "Prioritize",
        "Streamline",
        "Maintain", 
        "Accelerate", 
        "Focus", 
        "Wavelength",
        "Delivery",
        "AI",
        "Unmute",
        "Shift",
        "Change",
        "Goal",
        "Standard",
        "Digital",
        "Leadership",
        "Board",
        "Sprint",
      ]

      ///////////////////////////////////////////////
      // Main logic

      function getRandomRange(max, count){
        const allValues = [...Array(max).keys()]
        let result = []
        for (const element of [...Array(count).keys()]) {
          const randomIndex = Math.floor(Math.random()*allValues.length)
          result.push(allValues.splice(randomIndex,1));
        }
        return result
      }

      function selectRandomWords(words, count){
        return getRandomRange(words.length, count)
          .map((x) => words[x])
      }

      function createBox(inner) {
          const box = document.createElement("div");
          box.className = "box"
          box.style.height = "100%"
          box.addEventListener("click", () => box.style.background = box.style.background == "grey" ? "white" : "grey");
          box.appendChild(inner)
          const outer = document.createElement("div");
          outer.style.width = "25%"
          outer.style.aspectRatio = "1/1";
          outer.style.display = "inline-block"
          outer.style.padding = "1em"  
          outer.appendChild(box)
          return outer
      }

      function update () {
        const selectedWords = selectRandomWords(officeWords, 16)
        for (const selectedWord of selectedWords) {
          const inner = document.createElement("div");
          inner.style.fontSize = "4em";
          inner.innerText = selectedWord
          resultEl.appendChild(createBox(inner))
        }
      }

      ///////////////////////////////////////////////
      // Startup

      update()

    </script>
    <style>
      * {
        box-sizing: border-box;
      }
      html, body {
        margin: 0;
        height: 100%;
      }
      .wrapper {
        width: 100vw;
        height: 100dvh;

        --ratio: (12/14);
        max-width: calc(100dvh * var(--ratio));
        max-height: calc(100vw / var(--ratio));

        --viewsize: min(100vw, calc(100dvh * var(--ratio)));
        font-size: calc(var(--viewsize) / 100); /* This will proppegate to children with em*/

        margin: auto;
      }
      .box {
        border-width: 1em;
        border-color: black;
        border-style: solid;
        border-radius: 4em;
        align-content: center;
        text-align: center;
        background: white;
      }
    </style>
  </head>
  <body style="background: #21455d; overscroll-behavior: none;">
    <div class="wrapper">
      <div style="width:100%; padding:1em">
        <div class="box">
          <div style="font-size: 7em;">Lingo Bingo</div>
        </div>
      </div>
      <div id="result" style="width:100%; align-content: center; text-align: center;"></div>
    </div>
  </body>
</html>
