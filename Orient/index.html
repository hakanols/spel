<!DOCTYPE html>
<html>
	<head>
		<title>Scan all QR codes</title>
		<script type="module">
            import nacl from './nacl-fast-es.js';
			import * as misc from './misc.js';

			const titleField = document.getElementById("TitleField")
			const outputField = document.getElementById("OutputField")

			let id;
			const pageId = Date.now();
			const isNotString = (value) => typeof value == "string";

			window.clearStorage = function() {
				console.log("Clear")
				localStorage.clear()
				window.location = window.location.pathname
			}

			function initMemory(id,numberOfParts){
				if (localStorage[id] == undefined){
					const values = {}
					values.codes = Array(numberOfParts)
					values.lastEpoc = 0
					localStorage[id] = JSON.stringify(values);
				}
			}
			
			function setMemory(id, nr, value){
				let values = getMemoryValues(id)
				values.codes[nr] = value
				values.lastEpoc = pageId
				localStorage[id] = JSON.stringify(values)
			}
			
			function getMemoryKeys(id){
				let outText = []
				for (const code of getMemoryValues(id).codes){
					outText.push(isNotString(code)?"x":"_")
				}
				return "["+outText.join('|')+"]"
			}
			
			function getMemoryValues(id){
				return JSON.parse(localStorage[id])
			}
			
			function getSecret(box){
				const key = new Uint8Array(nacl.secretbox.keyLength);
                const nonce = new Uint8Array(nacl.secretbox.nonceLength);
                const msgOut = nacl.secretbox.open(box, nonce, key);
                return (new TextDecoder()).decode(msgOut)
			}
		
			window.onstorage = () => {
				const lastEpoc = getMemoryValues(id).lastEpoc
				if (lastEpoc > pageId){
					window.close();
				}
			};

			function run(){
				const queryString = window.location.search;
				const urlParams = new URLSearchParams(queryString)
				if (!urlParams.has('D')){
					outputField.innerText = "Missing param D";
					return;
				}
				const data = misc.fromBase64URL(urlParams.get('D'))
				const msgId = data.slice(0,4)
				const number = data[4]
				const index = data[5]
				const secretChunk = data.slice(6)
				id = misc.toHexString([...msgId, number])

				titleField.innerText = "Scan all "+number+" QR codes"

				console.log("Nr: "+index+" Code: "+secretChunk);
        
				initMemory(id, number)
				setMemory(id, index, misc.toBase64(secretChunk))
				outputField.innerText = "Last scan "+(index+1)+"\n"+getMemoryKeys(id)
				
				const codes = getMemoryValues(id).codes
				if (codes.every(isNotString)){
					const secretChunks =  codes.map((x) => misc.fromBase64(x))
					const secret = new Uint8Array(secretChunks.reduce((acc, curr) => [...acc, ...curr], []));
					const text = getSecret(secret)
					outputField.innerText = "Secret message:\n"+text
				}
			}

			run()
		
		</script>
    <style>
      html, body {
        margin: 0;
        height: 100%;
      }
      .wrapper {
        width: 100dvmin;
        height: 100dvmin;

        font-size: calc(100dvmin / 100); /* This will proppegate to children with em*/

        margin: auto;
		text-align: center;
      }
    </style>
  </head>
  <body style="overscroll-behavior: none;">
    <div class="wrapper">
		<h1 id="TitleField" style="font-size:5em">Scan all QR codes</h1>
		<div id="OutputField" style="font-size:5em"></div>
		<br>
		<button onclick="clearStorage()" style="font-size:3em;"">Clear</button>
	</body>
</html>
