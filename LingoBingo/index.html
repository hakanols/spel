<!DOCTYPE html>
<html style="overscroll-behavior: none;">
  <head>
    <title>ClockGame</title>
    <!-- Prevent mobile auto-scaling -->
    <meta name="viewport" content="width=device-width, height=device-height,
          initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script type="module">

      const resultEl = document.getElementById('result');
      const officeWords = [
        "Alignment", 
        "Synergy", 
        "Leverage", 
        "Optimize", 
        "Transform",
        "Enabling", 
        "Scale", 
        "Agility", 
        "Innovation", 
        "Momentum", 
        "Engagement", 
        "Execution", 
        "Prioritize",
        "Streamlie",
        "Maintain", 
        "Accelerate", 
        "Focus", 
        "Wavelength",
        "Delivery",
        "AI",
        "Unmute",
        "Shift",
        "Change",
        "Goal",
        "Standard",
        "Digital",
        "Leadership",
        "Board",
      ]

      ///////////////////////////////////////////////
      // Main logic

      function getRandomRange(max, count){
        const allValues = [...Array(max).keys()]
        let result = []
        for (const element of [...Array(count).keys()]) {
          const randomIndex = Math.floor(Math.random()*allValues.length)
          result.push(allValues.splice(randomIndex,1));
        }
        return result
      }

      function selectRandomWords(words, count){
        return getRandomRange(words.length, count)
          .map((x) => words[x])
      }

      function createBox(){
          const div = document.createElement("div");
          div.style.width = "20%"
          div.style.aspectRatio = "1/1";
          div.style.background = "white";
          div.style.alignContent = "center"
          div.style.verticalAlign = "middle"
          div.style.textAlign = "center"
          div.style.borderWidth = "0.6vh"
          div.style.borderColor = "black"
          div.style.borderStyle = "solid"
          div.style.borderRadius = "2vh"
          div.style.margin = "0.5vh"
          div.style.display = "inline-block"
          return div
      }

      function addWord(word, parent) {
          const box = createBox()
          const div = document.createElement("span");
          div.style.fontSize = "1.8vh";
          div.style.width = "100%"
          div.style.height = "100%"
          div.style.padding = "0.5vh"
          div.innerText = word
          box.appendChild(div)
          parent.appendChild(box)
          box.addEventListener("click", () => box.style.background = box.style.background == "grey" ? "white" : "grey");
          return box
      }

      function update () {
        const selectedWords = selectRandomWords(officeWords, 16)
        for (const selectedWord of selectedWords) {
          addWord(selectedWord, resultEl)
        }
      }

      ///////////////////////////////////////////////
      // Startup

      update()

    </script>
    <style>
      div.box   {border-width: 0.6vh; border-color: black; border-style: solid; border-radius: 2vh; align-content: center; text-align: center;}
    </style>
  </head>
  <body style="background: #21455d; overscroll-behavior: none; margin:0px;">
		<div style="width: 50vh; height: 100vh; text-align: center; 
		max-width: 100vh; max-height: 200vh; margin: auto;">
      <div class="box" style="width:95%; aspect-ratio:8/1; margin: 0.5vh; background: white; font-size: 7vh; text-align: center;">Lingo Bingo</div>
      <div id="result" style="width:100%; font-size: 3vh; font-weight: bold; align-content: center; text-align: center;"></div>
    </div>
  </body>
</html>
