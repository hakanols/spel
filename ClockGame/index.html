
<!DOCTYPE html>
<!-- Stolen from  -->
<!-- https://www.w3schools.com/graphics/tryit.asp?filename=trycanvas_clock_start -->
<html style="overscroll-behavior: none;">
  <head>
    <title>ClockGame</title>
    <meta name="viewport" content="width=700, initial-scale=1.0">
    <script type="module">
      const difficultyEasyEl = document.getElementById('easy');
      const difficultyModeratEl = document.getElementById('moderat');
      const difficultyHardEl = document.getElementById('hard');
      const difficultyApaEl = document.getElementById('apa');

      const questionEl = document.getElementById('question');
      const answersEl = document.getElementById('answers');
      const resultEl = document.getElementById('result');

      let correctElement;

      function difficulty(){
        switch (true) {
          case (difficultyEasyEl.checked):
            return 60
          case (difficultyModeratEl.checked):
            return 30
          case (difficultyHardEl.checked):
            return 15
          case (difficultyApaEl.checked):
            return 5
        }
      }

      function createClock(clockType, timeMin, checker){
        let element;
        if (clockType == 0) {
          element = createTextClock(timeMin)
        }
        if (clockType == 1) {
          element = createDigitalClock(timeMin)
        }
        if (clockType == 2) {
          element = createAnalogClock(timeMin)
        }
        element.addEventListener("click", () => checker(element));
        return element
      }

      function getRandomRange(max, count){
        const allValues = [...Array(max).keys()]
        let result = []
        for (const element of [...Array(count).keys()]) {
          const randomIndex = Math.floor(Math.random()*allValues.length)
          result.push(allValues.splice(randomIndex,1));
        }
        return result
      }

      function getGetRandomClocks(minutInterval, count){
         // To not collide we generate for half a day and the decide if it is morning or evening.
        const intervalls = 12*60/minutInterval;
        return getRandomRange(intervalls, count)
          .map((x) => x*minutInterval)
          .map(x => x + Math.floor(Math.random()*2)*12*60) // Add 12 hours by random.
      }

      function update () {
        const numberOfOptions = 3
        const clockValues = getGetRandomClocks(difficulty(), numberOfOptions)
        const clockTypes = getRandomRange(3, 2)

        const correctIndex = Math.floor(Math.random()*clockValues.length)
        questionEl.innerHTML = ""
        questionEl.appendChild(createClock(clockTypes[0], clockValues[correctIndex], (x) => {}));

        const clockElements = [...Array(numberOfOptions).keys().map(x => createClock(clockTypes[1], clockValues[x], checker))]
        console.log(clockElements)

        correctElement = clockElements[correctIndex]
        answersEl.innerHTML = ""
        clockElements.forEach(x => answersEl.appendChild(x));
      }

      async function checker(clickedElement){
        console.log("R: " + correctElement + " V: " + clickedElement )
        if (correctElement == clickedElement) {
          resultEl.innerHTML = resultEl.innerHTML + '|'
          clickedElement.style.borderColor = "green"
          clickedElement.style.borderWidth = "6px"

        }
        else {
          resultEl.innerHTML = ""
          clickedElement.style.borderColor = "red"
          clickedElement.style.borderWidth = "6px"

          correctElement.style.borderColor = "yellow"
          correctElement.style.borderWidth = "6px"
        }

        await new Promise(r => setTimeout(r, 2000));

        update()
      }

      function createTextClock(timeMin) {
          const div = document.createElement("span");
          div.style.fontSize = "40px";
          div.style.width = "400px"
          div.style.height = "400px"
          div.style.alignContent = "center"
          div.style.textAlign = "center"
          div.style.border = "2px solid black"
          div.style.borderRadius = "20px"
          div.style.display = "inline-block"
          div.innerHTML = timeToText(timeMin)
          return div
      }

      function createDigitalClock(timeMin) {
          const div = document.createElement("span");
          div.style.fontSize = "160px";
          div.style.width = "400px"
          div.style.height = "400px"
          div.style.alignContent = "center"
          div.style.textAlign = "center"
          div.style.border = "2px solid black"
          div.style.borderRadius = "20px"
          div.style.display = "inline-block"
          const hour = String(Math.floor(timeMin/60)%24).padStart(2, '0')
          const min = String(timeMin%60).padStart(2, '0')
          div.innerHTML = hour + ":" + min
          return div
      }

      function createAnalogClock(timeMin, size=400) {
          const canvas = document.createElement("canvas");
          canvas.width=size
          canvas.height=size
          canvas.style.border = "2px solid black"
          canvas.style.borderRadius = "20px"
          const ctx = canvas.getContext("2d");
          const radius = canvas.height / 2;
          ctx.reset();
          ctx.resetTransform();
          ctx.translate(radius, radius);
          drawFace(ctx, radius*0.94);
          drawNumbers(ctx, radius*0.94);
          drawTime(ctx, radius*0.94, timeMin);
          return canvas
      }

      function timeToText(timeMin) {

          const hour = myModelus(Math.floor(timeMin/(60)), 12)
          const nextHour = myModelus((hour+1), 12)
          const min = timeMin%60

          switch (true) {
            case (min == 0):
              return `${hour}`
            case (min == 15):
              return `Kvart över ${hour}`
            case (min == 30):
              return `Halv ${nextHour}`
            case (min == 45):
              return `Kvart i ${nextHour}`
            case (min >= 1 && 20 >= min):
              return `${min} minuter över ${hour}`
            case (min >= 21 && 29 >= min):
              return `${30-min} minuter i halv ${nextHour}`
            case (min >= 31 && 39 >= min):
              return `${min-30} minuter över halv ${nextHour}`
            case (min >= 40 && 59 >= min):
              return `${60-min} minuter i ${nextHour}`
            default:
              throw "Whattttt"
          }
      }

      function myModelus(number, divider){
        const modelus = number%divider
        return modelus == 0 ? divider : modelus
      }

      function drawFace(ctx, radius) {
        const grad = ctx.createRadialGradient(0,0,radius*0.95, 0,0,radius*1.05);
        grad.addColorStop(0, '#333');
        grad.addColorStop(0.5, 'white');
        grad.addColorStop(1, '#333');
        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, 2*Math.PI);
        ctx.fillStyle = 'white';
        ctx.fill();
        ctx.strokeStyle = grad;
        ctx.lineWidth = radius*0.1;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(0, 0, radius*0.1, 0, 2*Math.PI);
        ctx.fillStyle = '#333';
        ctx.fill();
        for(let num = 1; num <= 60; num++){
          const ang = num * Math.PI*2 / 60;
          ctx.beginPath();
          ctx.lineWidth = radius*0.02;
          const x = Math.sin(ang)*radius
          const y = -Math.cos(ang)*radius
          ctx.moveTo(x*0.85,y*0.85);
          ctx.lineTo(x*0.90,y*0.90);
          ctx.stroke();
        }
      }
      
      function drawNumbers(ctx, radius) {
        ctx.font = radius*0.15 + "px arial";
        ctx.textBaseline="middle";
        ctx.textAlign="center";
        for(let num = 1; num <= 12; num++){
          const ang = num * Math.PI*2 / 12;
          const x = Math.sin(ang)*radius*0.75
          const y = -Math.cos(ang)*radius*0.75
          ctx.fillText(num.toString(), x, y);
        }
      }
      
      function drawTime(ctx, radius, timeMin){
        drawHand(ctx, 2*Math.PI*timeMin/60, radius*0.8, radius*0.07); // Minutes
        drawHand(ctx, 2*Math.PI*timeMin/(60*12), radius*0.5, radius*0.07);  // Hours
      }
      
      function drawHand(ctx, ang, length, width) {
        ctx.beginPath();
        ctx.lineWidth = width;
        ctx.lineCap = "round";
        ctx.moveTo(0,0);
        const x = Math.sin(ang)*length
        const y = -Math.cos(ang)*length
        ctx.lineTo(x, y);
        ctx.stroke();
      }

      window.radioChange = function() {
        update()
      }

      difficultyEasyEl.checked = true
      resultEl.innerHTML = ""
      update()

    </script>
  </head>
  <body style="overscroll-behavior: none;">
    <input name="difficulty" type="radio" onclick="radioChange()" id="easy">
    <b>Lätt</b> 
    <input name="difficulty" type="radio" onclick="radioChange()" id="moderat">
    <b>Lagom</b> 
    <input name="difficulty" type="radio" onclick="radioChange()" id="hard">
    <b>Svårt</b>
    <input name="difficulty" type="radio" onclick="radioChange()" id="apa">
    <b>Apa</b> 
    <br>
    <div id="result" ></div>
    <br>
    <div id="question" ></div>
    <br>
    <div id="answers" ></div>
  </body>
</html>
