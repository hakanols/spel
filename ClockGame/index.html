<!DOCTYPE html>
<!-- Stolen from  -->
<!-- https://www.w3schools.com/graphics/tryit.asp?filename=trycanvas_clock_start -->
<html style="overscroll-behavior: none;">
  <head>
    <title>ClockGame</title>
    <!-- Prevent mobile auto-scaling -->
    <meta name="viewport" content="width=device-width, height=device-height,
          initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script type="module">
      const diff0ResultEl = document.getElementById('diff0');
      const diff1ResultEl = document.getElementById('diff1');
      const diff2ResultEl = document.getElementById('diff2');
      const diff3ResultEl = document.getElementById('diff3');
      const diffResultElements = [diff0ResultEl, diff1ResultEl, diff2ResultEl, diff3ResultEl]

      const questionEl = document.getElementById('question');
      const answersEl = document.getElementById('answers');
      const resultEl = document.getElementById('result');

      let correctElement;
      let difficulty
      let enableClick = true

      ///////////////////////////////////////////////
      // Main logic

      function getRandomRange(max, count){
        const allValues = [...Array(max).keys()]
        let result = []
        for (const element of [...Array(count).keys()]) {
          const randomIndex = Math.floor(Math.random()*allValues.length)
          result.push(allValues.splice(randomIndex,1));
        }
        return result
      }

      function getGetRandomClocks(difficulty, count){
        const minutInterval = [60, 30, 15, 5][difficulty]
        // To not collide we generate for half a day and the decide if it is morning or evening.
        const intervalls = 12*60/minutInterval;
        return getRandomRange(intervalls, count)
          .map((x) => x*minutInterval)
          .map(x => x + Math.floor(Math.random()*2)*12*60) // Add 12 hours by random.
      }

      function update () {
        const numberOfOptions = 4
        const clockValues = getGetRandomClocks(difficulty, numberOfOptions)
        const clockTypes = getRandomRange(3, 2)

        const correctIndex = Math.floor(Math.random()*clockValues.length)
        questionEl.innerHTML = ""
        createClock(clockTypes[0], clockValues[correctIndex], questionEl, (x) => {});

        answersEl.innerHTML = ""
        const clockElements = [...Array(numberOfOptions).keys().map(x => createClock(clockTypes[1], clockValues[x], answersEl, checker))]
        correctElement = clockElements[correctIndex]
      }

      async function checker(clickedElement){
        console.log("Clicked")

        if (!enableClick){
          return;
        }
        enableClick = false

        if (correctElement == clickedElement) {
          incrimentScore(difficulty)
          clickedElement.style.borderColor = "green"
          await sleep(1000);
        }
        else {
          setScore(difficulty, 0)
          clickedElement.style.borderColor = "red"
          correctElement.style.borderColor = "yellow"
          await sleep(3000);
        }
        update()
        enableClick = true
      }

      function sleep(ms) {
          return new Promise(resolve => setTimeout(resolve, ms));
      }

      function createClock(clockType, timeMin, parent, checker){
        let element;
        if (clockType == 0) {
          element = createTextClock(timeMin, parent)
        }
        if (clockType == 1) {
          element = createDigitalClock(timeMin, parent)
        }
        if (clockType == 2) {
          element = createAnalogClock(timeMin, parent)
        }
        element.addEventListener("click", () => checker(element));
        return element
      }


      function createBox(){
          const div = document.createElement("div");
          div.style.width = "40%"
          div.style.aspectRatio = "1/1";
          div.style.background = "white";
          div.style.alignContent = "center"
          div.style.verticalAlign = "middle"
          div.style.textAlign = "center"
          div.style.borderWidth = "0.6vh"
          div.style.borderColor = "black"
          div.style.borderStyle = "solid"
          div.style.borderRadius = "2vh"
          div.style.margin = "0.5vh"
          div.style.display = "inline-block"
          return div
      }

     ///////////////////////////////////////////////
     // Create digital clock

      function createDigitalClock(timeMin, parent) {
          const box = createBox()
          const div = document.createElement("span");
          div.style.fontSize = "6vh"
          div.style.width = "100%"
          div.style.height = "100%"
          const hour = String(Math.floor(timeMin/60)%24).padStart(2, '0')
          const min = String(timeMin%60).padStart(2, '0')
          div.innerText = hour + ":" + min
          box.appendChild(div)
          parent.appendChild(box)
          return box
      }

      ///////////////////////////////////////////////
      // Create text clock

      function createTextClock(timeMin, parent) {
          const box = createBox()
          const div = document.createElement("span");
          div.style.fontSize = "4vh";
          div.style.width = "100%"
          div.style.height = "100%"
          div.style.padding = "0.5vh"
          div.innerText = timeToText(timeMin)
          box.appendChild(div)
          parent.appendChild(box)

          return box
      }

      function timeToText(timeMin) {

          const hour = myModelus(Math.floor(timeMin/(60)), 12)
          const nextHour = myModelus((hour+1), 12)
          const min = timeMin%60

          switch (true) {
            case (min == 0):
              return `${hour}`
            case (min == 15):
              return `Kvart över ${hour}`
            case (min == 30):
              return `Halv ${nextHour}`
            case (min == 45):
              return `Kvart i ${nextHour}`
            case (min >= 1 && 20 >= min):
              return `${min} minuter över ${hour}`
            case (min >= 21 && 29 >= min):
              return `${30-min} minuter i halv ${nextHour}`
            case (min >= 31 && 39 >= min):
              return `${min-30} minuter över halv ${nextHour}`
            case (min >= 40 && 59 >= min):
              return `${60-min} minuter i ${nextHour}`
            default:
              throw "Shall not happen. Time: " + timeMin
          }
      }

      function myModelus(number, divider){
        const modelus = number%divider
        return modelus == 0 ? divider : modelus
      }

      ///////////////////////////////////////////////
      // Create analog clock

      function createAnalogClock(timeMin, parent) {
          const box = createBox()
          const canvas = document.createElement("canvas");
          canvas.style.width = "100%"
          canvas.style.height = "100%"
          canvas.style.verticalAlign = "middle"
          box.appendChild(canvas)
          parent.appendChild(box)
          const ctx = canvas.getContext("2d");
          const radius = canvas.getBoundingClientRect().width / 2;

          const widthScale = canvas.width / canvas.getBoundingClientRect().width
          const heigthScale = canvas.height / canvas.getBoundingClientRect().height

          ctx.reset();
          ctx.resetTransform();
          ctx.transform(widthScale, 0, 0, heigthScale, 0, 0);
          ctx.translate(radius, radius);
          drawFace(ctx, radius*0.94);
          drawNumbers(ctx, radius*0.94);
          drawTime(ctx, radius*0.94, timeMin);
          return box
      }


      function drawFace(ctx, radius) {
        const grad = ctx.createRadialGradient(0,0,radius*0.95, 0,0,radius*1.05);
        grad.addColorStop(0, '#333');
        grad.addColorStop(0.5, 'white');
        grad.addColorStop(1, '#333');
        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, 2*Math.PI);
        ctx.fillStyle = 'white';
        ctx.fill();
        ctx.strokeStyle = grad;
        ctx.lineWidth = radius*0.1;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(0, 0, radius*0.1, 0, 2*Math.PI);
        ctx.fillStyle = '#333';
        ctx.fill();
        for(let num = 1; num <= 60; num++){
          const ang = num * Math.PI*2 / 60;
          ctx.beginPath();
          ctx.lineWidth = radius*0.02;
          const x = Math.sin(ang)*radius
          const y = -Math.cos(ang)*radius
          ctx.moveTo(x*0.85,y*0.85);
          ctx.lineTo(x*0.90,y*0.90);
          ctx.stroke();
        }
      }
      
      function drawNumbers(ctx, radius) {
        ctx.font = radius*0.15 + "px arial";
        ctx.textBaseline="middle";
        ctx.textAlign="center";
        for(let num = 1; num <= 12; num++){
          const ang = num * Math.PI*2 / 12;
          const x = Math.sin(ang)*radius*0.75
          const y = -Math.cos(ang)*radius*0.75
          ctx.fillText(num.toString(), x, y);
        }
      }
      
      function drawTime(ctx, radius, timeMin){
        drawHand(ctx, 2*Math.PI*timeMin/60, radius*0.8, radius*0.07); // Minutes
        drawHand(ctx, 2*Math.PI*timeMin/(60*12), radius*0.5, radius*0.07);  // Hours
      }
      
      function drawHand(ctx, ang, length, width) {
        ctx.beginPath();
        ctx.lineWidth = width;
        ctx.lineCap = "round";
        ctx.moveTo(0,0);
        const x = Math.sin(ang)*length
        const y = -Math.cos(ang)*length
        ctx.lineTo(x, y);
        ctx.stroke();
      }

      ///////////////////////////////////////////////
      // Points

      const startScores = [0, 0, 0, 0]
      let scores = startScores

      function incrimentScore(difficulty){
        setScore(difficulty, scores[difficulty] + 1)
      }

      function setScore(difficulty, score){
        scores[difficulty] = score
        updateHighScores(scores)
        drawScores()
      }

      function updateHighScores(){
        let highScores = getHighScores()
        for (let i = 0; i < highScores.length; i++) {
          highScores[i] = Math.max(highScores[i], scores[i])
        }
        window.localStorage.highScores = JSON.stringify(highScores)
      }

      function clearHighScores(){
        window.localStorage.removeItem("highScores")
      }

      function getHighScores(){
        try {
          const highScores = JSON.parse(window.localStorage.highScores)
          if (Array.isArray(highScores) && highScores.length == scores.length && highScores.every((x)=>Number.isInteger(x))){  
            return highScores
          }
        } catch (e) {}
        clearHighScores()
        return startScores
      }

      function drawScores(){
        let scoreText = "   "
        const highScores = getHighScores()
        for (let i = 0; i < highScores.length; i++) {
          diffResultElements[i].innerText = scores[i]+" ("+highScores[i]+")"
        }
      }

      ///////////////////////////////////////////////
      // Startup

      window.radioChange = function(newDifficulty) {
        if (difficulty != newDifficulty){ // To prevent reloads
          difficulty = newDifficulty
          update()
        }
      }

      window.madeOfClick = function() {
         if (confirm("Rensa high score")) {
          clearHighScores()
          drawScores()
        } 
      }

      drawScores()
      document.getElementById('startRadio').click()
      update()

    </script>
    <style>
      input     {width: 2.5vh; height: 2.5vh;}
      b         {font-size: 2.2vh;}
      div.box   {border-width: 0.6vh; border-color: black; border-style: solid; border-radius: 2vh;
                 align-content: center; margin: 0.5vh; background: white; text-align: center;
                 display: inline-block; padding-top: 0.5vh; padding-bottom: 0.5vh; }
    </style>
  </head>
  <body style="background: #21455d; overscroll-behavior: none; margin:0px;">
		<div style="width: 50vh; height: 100vh; text-align: center; 
		max-width: 100vh; max-height: 200vh; margin: auto;">
      <div class="box" style="width:20%; aspect-ratio:8/1;">
        <input name="difficulty" type="radio" onclick="radioChange(0)" id="startRadio">
        <b>Hel</b>
        <br>
        <b  id="diff0"></b>
      </div>
      <div class="box" style="width:20%; aspect-ratio:8/1;">
        <input name="difficulty" type="radio" onclick="radioChange(1)">
        <b>Halv</b>
        <br>
        <b id="diff1"></b>
      </div>
      <div class="box" style="width:20%; aspect-ratio:8/1;">
        <input name="difficulty" type="radio" onclick="radioChange(2)">
        <b>Kvart</b>
        <br>
        <b id="diff2"></b>
      </div>
      <div class="box" style="width:20%; aspect-ratio:8/1;">
        <input name="difficulty" type="radio" onclick="radioChange(3)">
        <b>5 Min</b>
        <br>
        <b id="diff3"></b>
      </div>

      <div id="question" style="width:100%; text-align: center;"></div>
      <div id="answers" style="width:100%; text-align: center; align-content: center; display: inline-block;"></div>
      <br><br>
      <b onclick="madeOfClick()">Av Håkan och Hjalmar</b>
    </div>
  </body>
</html>
