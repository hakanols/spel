<html>
  <head>
    <title>Clock</title>
    <meta name="viewport" content="width=700, initial-scale=1.0">
	  <script type="module">
      const difficultyEasyEl = document.getElementById('easy');
      const difficultyModeratEl = document.getElementById('moderat');
      const difficultyHardEl = document.getElementById('hard');
      const difficultyApaEl = document.getElementById('apa');

      const questionEl = document.getElementById('question');
      const answersEl = document.getElementById('answers');
      const resultEl = document.getElementById('result');


      function difficulty(){
        if (difficultyEasyEl.checked) {
          return 60
        }
        if (difficultyModeratEl.checked) {
          return 30
        }
        if (difficultyHardEl.checked) {
          return 15
        }
        if (difficultyApaEl.checked) {
          return 5
        }
      }

      function createClock(clockType, timeMin, checker){
        let element;
        const randomExtraMin= Math.floor(Math.random()*2)*12*60
        if (clockType == 0) {
          element = createTextClock((timeMin+randomExtraMin)*60)
        }
        if (clockType == 1) {
          element = createDigitalClock((timeMin+randomExtraMin)*60)
        }
        if (clockType == 2) {
          element = createAnalogClock(timeMin*60)
        }
        element.addEventListener("click", () => checker(timeMin));
        return element
      }

      function getRandomRange(max, count){
        const allValues = [...Array(max).keys()]
        let result = []
        for (const element of [...Array(count).keys()]) {
          const randomIndex = Math.floor(Math.random()*allValues.length)
          result.push(allValues.splice(randomIndex,1));
        }
        return result
      }

      function update () {
        const minutInterval = difficulty()
        const clockValues = getRandomRange(12*60/minutInterval, 3).map((x) => x*minutInterval)
        const clockTypes = getRandomRange(3, 2)

        const timeMin = clockValues[Math.floor(Math.random()*clockValues.length)]
        questionEl.innerHTML = ""
        questionEl.appendChild(createClock(clockTypes[0], timeMin, (x) => {}));

        answersEl.innerHTML = ""
        answersEl.appendChild(createClock(clockTypes[1], clockValues[0], (x) => checker(timeMin, x)));
        answersEl.appendChild(createClock(clockTypes[1], clockValues[1], (x) => checker(timeMin, x)));
        answersEl.appendChild(createClock(clockTypes[1], clockValues[2], (x) => checker(timeMin, x)));
      }

      function checker(real, value){
        console.log("R: " + real + " V: " + value )
        if (real == value) {
          console.log("Correct")
          resultEl.innerHTML = "Resultat: Rätt"
        }
        else {
          console.log("Wrong")
          resultEl.innerHTML = "Resultat: Fel"
        }
        update()
      }

      function createTextClock(totSeconds) {
					const div = document.createElement("div");
					div.style= "font-size: 40px; width: 400px; text-align: center; border: 2px solid black; border-radius: 20px;"
          div.innerHTML = timeToText(totSeconds)
          return div
      }

      function createDigitalClock(totSeconds) {
					const div = document.createElement("div");
					div.style= "font-size: 100px; width: 400px; text-align: center; border: 2px solid black; border-radius: 20px;"
          const hour = String(Math.floor(totSeconds/(60*60))%24).padStart(2, '0')
          const min = String(Math.floor(totSeconds/60)%60).padStart(2, '0')
          const sec = String(totSeconds%60).padStart(2, '0')
          div.innerHTML = hour + ":" + min +  ":" + sec 
          return div
      }

      function createAnalogClock(totSeconds) {
					const canvas = document.createElement("canvas");
          canvas.width="400"
          canvas.height="400"
					canvas.style="background-color:#333"
          const ctx = canvas.getContext("2d");
          const radius = canvas.height / 2;
          ctx.reset();
          ctx.resetTransform();
          ctx.translate(radius, radius);
          drawFace(ctx, radius*0.9);
          drawNumbers(ctx, radius*0.9);
          drawTime(ctx, radius*0.9, totSeconds);
          return canvas
      }

      function timeToText(totSeconds) {

          const hour = myModelus(Math.floor(totSeconds/(60*60)), 12)
          const nextHour = myModelus((hour+1), 12)
          const min = Math.floor(totSeconds/60)%60

          switch (true) {
            case (min == 0):
              return `${hour}`
            case (min == 15):
              return `Kvart över ${hour}`
            case (min == 30):
              return `Halv ${nextHour}`
            case (min == 45):
              return `Kvart i ${nextHour}`
            case (min >= 1 && 20 >= min):
              return `${min} minuter över ${hour}`
            case (min >= 21 && 29 >= min):
              return `${30-min} minuter i halv ${nextHour}`
            case (min >= 31 && 39 >= min):
              return `${min-30} minuter över halv ${nextHour}`
            case (min >= 40 && 59 >= min):
              return `${60-min} minuter i ${nextHour}`
            default:
              throw "Whattttt"
          }
      }

      function myModelus(number, divider){
        const modelus = number%divider
        return modelus == 0 ? divider : modelus
      }

      function drawFace(ctx, radius) {
        const grad = ctx.createRadialGradient(0,0,radius*0.95, 0,0,radius*1.05);
        grad.addColorStop(0, '#333');
        grad.addColorStop(0.5, 'white');
        grad.addColorStop(1, '#333');
        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, 2*Math.PI);
        ctx.fillStyle = 'white';
        ctx.fill();
        ctx.strokeStyle = grad;
        ctx.lineWidth = radius*0.1;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(0, 0, radius*0.1, 0, 2*Math.PI);
        ctx.fillStyle = '#333';
        ctx.fill();
        for(let num = 1; num <= 60; num++){
          const ang = num * Math.PI*2 / 60;
          ctx.beginPath();
          ctx.lineWidth = radius*0.02;
          const x = Math.sin(ang)*radius
          const y = -Math.cos(ang)*radius
          ctx.moveTo(x*0.85,y*0.85);
          ctx.lineTo(x*0.90,y*0.90);
          ctx.stroke();
        }
      }
      
      function drawNumbers(ctx, radius) {
        ctx.font = radius*0.15 + "px arial";
        ctx.textBaseline="middle";
        ctx.textAlign="center";
        for(let num = 1; num <= 12; num++){
          const ang = num * Math.PI*2 / 12;
          const x = Math.sin(ang)*radius*0.75
          const y = -Math.cos(ang)*radius*0.75
          ctx.fillText(num.toString(), x, y);
        }
      }
      
      function drawTime(ctx, radius, totSeconds){
        drawHand(ctx, 2*Math.PI*totSeconds/60, radius*0.8, radius*0.02); // Seconds
        drawHand(ctx, 2*Math.PI*totSeconds/(60*60), radius*0.8, radius*0.07); // Minutes
        drawHand(ctx, 2*Math.PI*totSeconds/(60*60*12), radius*0.5, radius*0.07);  // Hours
      }
      
      function drawHand(ctx, ang, length, width) {
        ctx.beginPath();
        ctx.lineWidth = width;
        ctx.lineCap = "round";
        ctx.moveTo(0,0);
        const x = Math.sin(ang)*length
        const y = -Math.cos(ang)*length
        ctx.lineTo(x, y);
        ctx.stroke();
      }

      window.radioChange = function() {
        update()
      }

      difficultyEasyEl.checked = true
      resultEl.innerHTML = "Resultat: "
      update()

    </script>
  </head>
  <body>
    <p>Gissa</p>
    <input name="difficulty" type="radio" onclick="radioChange()" id="easy">
    <b>Lätt</b> 
    <input name="difficulty" type="radio" onclick="radioChange()" id="moderat">
    <b>Lagom</b> 
    <input name="difficulty" type="radio" onclick="radioChange()" id="hard">
    <b>Svårt</b>
    <input name="difficulty" type="radio" onclick="radioChange()" id="apa">
    <b>Apa</b> 
    <br>
    <div id="result" ></div>
    <br>
    <div id="question" ></div>
    <br>
    <div id="answers" ></div>
  </body>
</html>
