<!DOCTYPE html>

<html style="overscroll-behavior: none;">
    <head>
        <title>Pascals triangle</title>
        <meta name="viewport" content="width=device-width, height=device-height,
            initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <script type="module">

        const outputArea = document.getElementById("OutputArea")

        function print(text){
            outputArea.innerHTML += text;
        }

        function printArray(array){
            print(array.map((num)=> num % 2 ? '•' : ' ').join(' '))
        }

        function calculateNext(inArray){
            inArray = [0, ...inArray, 0]
            let outArray = []
            for (let i = 1; i < inArray.length; i++) {
                outArray = [...outArray, inArray[i-1]+inArray[i]];
            }
            return outArray
        }

        function init() {
            let array = [1];
            printArray(array);

            for (let i = 0; i < 31; i++) {
                print("\r\n")
                array = calculateNext(array)
                printArray(array);
            }
        }

        init()

        </script>
        <style>
            html, body {
                margin: 0;
                height: 100%;
            }
            .wrapper {
                width: 100dvmin;
                height: 100dvmin;

                font-size: calc(100dvmin / 100); /* This will proppegate to children with em*/

                margin: auto;
            }
        </style>
    </head>
    <body style="overscroll-behavior: none;">
        <div class="wrapper">
            <h2 style="font-size: 3em; margin: 0;">Pascals triangel</h2>
            <textarea readonly id="OutputArea" style="width:90%; height:90%; resize: none; text-align:center; font-family:monospace; font-size: 2.2em;"></textarea>
        </div>
    </body>
</html>
